version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    target-branch: "dev"
    open-pull-requests-limit: 2
    # One bundled PR per scan — avoids the weekly PR firehose.
    groups:
      all-npm:
        patterns: ["*"]
    labels:
      - "type:chore"
      - "area:deps"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    target-branch: "dev"
    open-pull-requests-limit: 1
    groups:
      all-actions:
        patterns: ["*"]
    labels:
      - "type:ci"
      - "area:deps"
