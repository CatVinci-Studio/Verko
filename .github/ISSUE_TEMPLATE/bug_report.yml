name: "🐛 Bug Report"
description: "Report something that isn't working as expected"
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible to help us reproduce the issue.

  - type: input
    id: version
    attributes:
      label: "Version"
      description: "App version, or commit hash if building from source"
      placeholder: "e.g. v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: "Platform"
      options:
        - macOS
        - Windows
        - Linux
        - All platforms
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "What happened?"
      description: "A clear description of the bug"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      placeholder: |
        1. Open...
        2. Click...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Logs / Screenshots (optional)"
      description: "Paste console output or attach screenshots. Wrap logs in code blocks."

  - type: textarea
    id: context
    attributes:
      label: "Additional context (optional)"
      description: "Anything else that might be relevant"
