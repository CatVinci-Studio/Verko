name: Release Guard

on:
  pull_request:
    branches: [main]

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump
        run: |
          BASE_VERSION=$(git show origin/main:package.json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).version)")
          PR_VERSION=$(node -e "console.log(require('./package.json').version)")

          echo "Base version : $BASE_VERSION"
          echo "PR version   : $PR_VERSION"

          if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
            echo "❌ Version in package.json must be bumped before merging to main."
            echo "   Current: $BASE_VERSION — please update to a higher semver."
            exit 1
          fi

          echo "✅ Version bump detected: $BASE_VERSION → $PR_VERSION"
