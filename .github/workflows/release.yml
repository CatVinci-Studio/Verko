name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (Intel dropped — Apple Silicon mainstream
          # since 2020; cuts release CI time by ~25%)
          - os: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          # Windows: NSIS .exe + WiX .msi (bundle.targets in tauri.conf.json).
          - os: windows-latest
            args: ''
            rust_targets: ''
          # Linux: .AppImage + .deb + .rpm.
          - os: ubuntu-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # webkit2gtk + soup3 are required for the webview, librsvg for icons,
      # libayatana-appindicator for the tray (kept even if unused — Tauri's
      # default features pull it in).
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build & publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'Automated release for ${{ github.ref_name }}.'
          # Semver prerelease tags (anything with a hyphen, e.g. v0.5.0-1)
          # publish as a GitHub prerelease; stable tags as a full release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

      # Portable Windows zip: ship the unpacked verko.exe alongside the NSIS
      # installer. No installer = no Defender SmartScreen "unknown publisher"
      # prompt, and no per-machine state. Requires WebView2 Runtime on the
      # user's machine (default on Win10 21H2+ / Win11).
      - name: Package Windows portable zip
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ github.ref_name }}'
          $version = $tag.TrimStart('v')
          $exe = 'src-tauri/target/release/verko.exe'
          if (-not (Test-Path $exe)) { throw "missing $exe" }
          $zip = "Verko_${version}_x64-portable.zip"
          Compress-Archive -Path $exe -DestinationPath $zip -Force
          gh release upload $tag $zip --clobber

  # Android APK build. Unsigned (debug keystore) — sideloadable for
  # testing, not Play Store ready. Production signing waits until we
  # have a release keystore stored as a workflow secret.
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973'

      - name: Install Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Tauri CLI
        run: cargo install tauri-cli@^2 --locked

      # NDK_HOME points the Tauri CLI's ndk-build at the right toolchain.
      # The setup-android action exports ANDROID_NDK_ROOT; mirror it.
      - name: Initialize Android project
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: cargo tauri android init

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: cargo tauri android build --apk

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag='${{ github.ref_name }}'
          version="${tag#v}"
          apk=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | head -1)
          if [ -z "$apk" ]; then echo "no APK found"; exit 1; fi
          cp "$apk" "Verko_${version}.apk"
          gh release upload "$tag" "Verko_${version}.apk" --clobber
