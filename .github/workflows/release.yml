name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - os: macos-latest
            args: --target aarch64-apple-darwin
          # macOS Intel
          - os: macos-13
            args: --target x86_64-apple-darwin
          - os: windows-latest
            args: ''
          - os: ubuntu-latest
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS jobs split arm64 vs intel; non-macOS builds for the host.
          targets: ${{ contains(matrix.args, '--target') && (contains(matrix.args, 'aarch64-apple-darwin') && 'aarch64-apple-darwin' || 'x86_64-apple-darwin') || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # webkit2gtk + soup3 are required for the webview, librsvg for icons,
      # libayatana-appindicator for the tray (kept even if unused — Tauri's
      # default features pull it in).
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev

      - name: Install npm deps
        run: npm ci

      - name: Build & publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'Automated release for ${{ github.ref_name }}.'
          # Semver prerelease tags (anything with a hyphen, e.g. v0.5.0-dev.1)
          # publish as a GitHub prerelease; stable tags as a full release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}
