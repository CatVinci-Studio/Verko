appId: studio.catvinci.verko
productName: Verko
copyright: Copyright © 2025 CatVinci-Studio

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - package.json

# macOS
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]      # separate Intel + Apple Silicon dmgs (universal blocked by @napi-rs native modules)
  identity: null              # unsigned for now; users right-click → Open
  gatekeeperAssess: false
  icon: resources/icon.png    # electron-builder converts to .icns at build time

dmg:
  sign: false

# Windows
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true

# Linux
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Office
  icon: resources/icon.png

publish:
  provider: github
  owner: CatVinci-Studio
  repo: Verko
  releaseType: release
